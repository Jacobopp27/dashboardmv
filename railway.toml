# Configuración de despliegue en Railway para el backend Monteverdi.
# IMPORTANTE: en Railway hay que crear un VOLUMEN persistente montado en /data
# y definir DATA_ROOT=/data para que los Excel subidos por la web no se borren
# en cada redespliegue. Ver DESPLIEGUE.md paso 2.
[build]
builder = "NIXPACKS"

[deploy]
startCommand = "uvicorn backend.api:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
